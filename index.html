<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Landing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --font-mono: 'Fira Code', monospace;
            --font-sans: 'Inter', sans-serif;
            --color-pink-soft: #ff6b9d;
            --color-pink-deep: #ff4d6d;
            --color-brand-red: #ff003c;
            --bg-dark: #0a0a0f;
            --bg-panel: #111118;
        }
        
        body {
            background: var(--bg-dark);
            color: #e8e8e8;
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.03) 0px,
                rgba(0, 0, 0, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
        }
        
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }
        
        .terminal {
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.8;
            max-width: 600px;
            width: 90%;
            z-index: 10;
            position: relative;
        }
        
        .terminal-line {
            opacity: 0;
            transform: translateY(5px);
            animation: fadeInUp 0.3s ease forwards;
            margin-bottom: 4px;
        }
        
        .system-tag {
            color: var(--color-pink-soft);
        }
        
        .status-tag {
            color: #888;
        }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--color-pink-soft);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .decrypt-container {
            margin-top: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            text-align: center;
        }
        
        .decrypt-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .decrypt-btn {
            background: linear-gradient(135deg, var(--color-pink-deep), var(--color-brand-red));
            color: white;
            border: none;
            padding: 14px 32px;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 0, 60, 0.3);
        }
        
        .decrypt-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 0, 60, 0.5);
        }
        
        .decrypt-btn:active {
            transform: translateY(0);
        }
        
        .decrypt-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .decrypt-btn:hover::before {
            left: 100%;
        }
        
        .decrypt-hint {
            color: #666;
            font-size: 11px;
            margin-top: 10px;
            font-family: var(--font-mono);
        }
        
        #heartCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        #heartCanvas.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .glow-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-sans);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            color: white;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease 0.5s;
            text-shadow: 0 0 40px rgba(255, 77, 109, 0.8), 0 0 80px rgba(255, 0, 60, 0.4);
            letter-spacing: 2px;
        }
        
        .glow-text.visible {
            opacity: 1;
        }
        
        .particle-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 77, 109, 0.15) 0%, transparent 70%);
            z-index: 6;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        .particle-glow.visible {
            opacity: 1;
        }
        
        .ambient-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 7;
        }
        
        .ambient-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--color-pink-soft);
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 4s ease-in-out infinite;
            box-shadow: 0 0 6px var(--color-pink-soft);
        }
        
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            20% {
                opacity: 0.8;
                transform: translateY(-20px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(0.5);
            }
        }
        
        .terminal.hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        
        @keyframes heartPulse {
            0%, 100% { 
                text-shadow: 0 0 40px rgba(255, 77, 109, 0.8), 0 0 80px rgba(255, 0, 60, 0.4);
            }
            50% { 
                text-shadow: 0 0 60px rgba(255, 77, 109, 1), 0 0 120px rgba(255, 0, 60, 0.6), 0 0 180px rgba(255, 0, 60, 0.3);
            }
        }
        
        .glow-text.pulsing {
            animation: heartPulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    
    <div class="terminal" id="terminal">
        <div class="terminal-line" style="animation-delay: 0.2s;">
            <span class="system-tag">[system]</span> Initializing heart.PROTOCOL_v2.0...
        </div>
        <div class="terminal-line" style="animation-delay: 0.8s;">
            <span class="status-tag">[status]</span> Loading core modules...
        </div>
        <div class="terminal-line" style="animation-delay: 1.4s;">
            <span class="status-tag">[status]</span> Establishing secure connection...
        </div>
        <div class="terminal-line" style="animation-delay: 2.0s;">
            <span class="system-tag">[system]</span> Protocol ready. Awaiting input<span class="cursor"></span>
        </div>
        <div class="terminal-line" style="animation-delay: 2.6s;">
            <span style="color: #aaa;">> One encrypted package found for you.</span>
        </div>
    </div>
    
    <div class="decrypt-container" id="decryptContainer">
        <button class="decrypt-btn" id="decryptBtn">
            <span style="margin-right: 8px;">🔒</span> DECRYPT MESSAGE
        </button>
        <div class="decrypt-hint">(or just click anywhere)</div>
    </div>
    
    <canvas id="heartCanvas"></canvas>
    <div class="particle-glow" id="particleGlow"></div>
    <div class="glow-text" id="glowText">Love you.</div>
    <div class="ambient-particles" id="ambientParticles"></div>

    <script>
        const terminal = document.getElementById('terminal');
        const decryptContainer = document.getElementById('decryptContainer');
        const decryptBtn = document.getElementById('decryptBtn');
        const heartCanvas = document.getElementById('heartCanvas');
        const glowText = document.getElementById('glowText');
        const particleGlow = document.getElementById('particleGlow');
        const ambientContainer = document.getElementById('ambientParticles');
        const ctx = heartCanvas.getContext('2d');
        
        let decrypted = false;
        let particles = [];
        let time = 0;
        
        setTimeout(() => {
            decryptContainer.classList.add('visible');
        }, 3200);
        
        function resizeCanvas() {
            heartCanvas.width = window.innerWidth;
            heartCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        function getHeartPosition(t, scale = 1) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x * scale, y: y * scale };
        }
        
        class TextParticle {
            constructor(x, y, targetX, targetY, text, delay) {
                this.x = x;
                this.y = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.startX = x;
                this.startY = y;
                this.delay = delay;
                this.progress = 0;
                this.speed = 0.006 + Math.random() * 0.01;
                this.text = text;
                this.opacity = 0;
                this.settled = false;
                this.floatOffset = Math.random() * Math.PI * 2;
                this.floatSpeed = 0.3 + Math.random() * 0.5;
                this.fontSize = 8 + Math.random() * 6;
            }
            
            update() {
                if (this.delay > 0) {
                    this.delay--;
                    return;
                }
                
                if (!this.settled) {
                    this.progress += this.speed;
                    if (this.progress >= 1) {
                        this.progress = 1;
                        this.settled = true;
                    }
                    
                    const t = this.progress;
                    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                    
                    this.x = this.startX + (this.targetX - this.startX) * ease;
                    this.y = this.startY + (this.targetY - this.startY) * ease;
                    
                    this.opacity = Math.min(0.9, this.progress * 1.5);
                } else {
                    this.opacity = 0.5 + Math.sin(time * this.floatSpeed + this.floatOffset) * 0.3;
                }
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                
                const centerX = heartCanvas.width / 2;
                const centerY = heartCanvas.height / 2;
                const distFromCenter = Math.sqrt(
                    Math.pow(this.targetX - centerX, 2) + Math.pow(this.targetY - centerY, 2)
                );
                const maxDist = 180;
                const warmth = Math.max(0, 1 - distFromCenter / maxDist);
                
                const r = 255;
                const g = Math.floor(50 + warmth * 120);
                const b = Math.floor(80 + warmth * 100);
                
                ctx.font = `${this.fontSize}px 'Fira Code', monospace`;
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.shadowColor = `rgb(${r}, ${g}, ${b})`;
                ctx.shadowBlur = 3 + warmth * 5;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, this.x, this.y);
                
                ctx.restore();
            }
        }
        
        class Particle {
            constructor(x, y, targetX, targetY, delay) {
                this.x = x;
                this.y = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.startX = x;
                this.startY = y;
                this.delay = delay;
                this.progress = 0;
                this.speed = 0.008 + Math.random() * 0.012;
                this.size = 0.5 + Math.random() * 1.5;
                this.opacity = 0;
                this.settled = false;
                this.floatOffset = Math.random() * Math.PI * 2;
                this.floatSpeed = 0.5 + Math.random() * 1;
            }
            
            update() {
                if (this.delay > 0) {
                    this.delay--;
                    return;
                }
                
                if (!this.settled) {
                    this.progress += this.speed;
                    if (this.progress >= 1) {
                        this.progress = 1;
                        this.settled = true;
                    }
                    
                    const t = this.progress;
                    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                    
                    this.x = this.startX + (this.targetX - this.startX) * ease;
                    this.y = this.startY + (this.targetY - this.startY) * ease;
                    
                    this.opacity = Math.min(1, this.progress * 2);
                } else {
                    this.opacity = 0.6 + Math.sin(time * this.floatSpeed + this.floatOffset) * 0.3;
                }
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                
                const centerX = heartCanvas.width / 2;
                const centerY = heartCanvas.height / 2;
                const distFromCenter = Math.sqrt(
                    Math.pow(this.targetX - centerX, 2) + Math.pow(this.targetY - centerY, 2)
                );
                const maxDist = 150;
                const warmth = Math.max(0, 1 - distFromCenter / maxDist);
                
                const r = Math.floor(255);
                const g = Math.floor(77 + warmth * 100);
                const b = Math.floor(109 + warmth * 80);
                
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.shadowColor = `rgb(${r}, ${g}, ${b})`;
                ctx.shadowBlur = this.settled ? 4 + warmth * 6 : 2;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function createHeartParticles() {
            const centerX = heartCanvas.width / 2;
            const centerY = heartCanvas.height / 2;
            const scale = Math.min(heartCanvas.width, heartCanvas.height) / 35;
            
            particles = [];
            
            const numParticles = 800;
            const texts = ['i love you', 'love you', 'i love you', 'love', 'i love you'];
            
            for (let i = 0; i < numParticles; i++) {
                let tx, ty;
                let attempts = 0;
                do {
                    const t = Math.random() * Math.PI * 2;
                    const r = Math.random() * 0.95;
                    const pos = getHeartPosition(t, scale * r);
                    tx = centerX + pos.x;
                    ty = centerY + pos.y;
                    attempts++;
                } while (attempts < 100);
                
                const side = Math.floor(Math.random() * 4);
                let sx, sy;
                switch(side) {
                    case 0: sx = Math.random() * heartCanvas.width; sy = -50; break;
                    case 1: sx = heartCanvas.width + 50; sy = Math.random() * heartCanvas.height; break;
                    case 2: sx = Math.random() * heartCanvas.width; sy = heartCanvas.height + 50; break;
                    case 3: sx = -50; sy = Math.random() * heartCanvas.height; break;
                }
                
                const text = texts[Math.floor(Math.random() * texts.length)];
                const delay = Math.floor(Math.random() * 60);
                
                particles.push(new TextParticle(sx, sy, tx, ty, text, delay));
            }
            
            for (let i = 0; i < 200; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.random() * 0.9;
                const pos = getHeartPosition(t, scale * r);
                const tx = centerX + pos.x;
                const ty = centerY + pos.y;
                
                const side = Math.floor(Math.random() * 4);
                let sx, sy;
                switch(side) {
                    case 0: sx = Math.random() * heartCanvas.width; sy = -50; break;
                    case 1: sx = heartCanvas.width + 50; sy = Math.random() * heartCanvas.height; break;
                    case 2: sx = Math.random() * heartCanvas.width; sy = heartCanvas.height + 50; break;
                    case 3: sx = -50; sy = Math.random() * heartCanvas.height; break;
                }
                
                const delay = Math.floor(Math.random() * 80);
                particles.push(new Particle(sx, sy, tx, ty, delay));
            }
        }
        
        function createAmbientParticles() {
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'ambient-particle';
                p.style.left = (30 + Math.random() * 40) + '%';
                p.style.top = (40 + Math.random() * 30) + '%';
                p.style.animationDelay = (Math.random() * 4) + 's';
                p.style.animationDuration = (3 + Math.random() * 3) + 's';
                ambientContainer.appendChild(p);
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, heartCanvas.width, heartCanvas.height);
            time += 0.016;
            
            const centerX = heartCanvas.width / 2;
            const centerY = heartCanvas.height / 2;
            const pulseSize = 150 + Math.sin(time * 1.5) * 20;
            
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, pulseSize * 2);
            gradient.addColorStop(0, `rgba(255, 77, 109, ${0.08 + Math.sin(time * 1.5) * 0.03})`);
            gradient.addColorStop(0.5, `rgba(255, 0, 60, ${0.03 + Math.sin(time * 1.5) * 0.01})`);
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, heartCanvas.width, heartCanvas.height);
            
            for (const p of particles) {
                p.update();
                p.draw(ctx);
            }
            
            requestAnimationFrame(animate);
        }
        
        function decrypt() {
            if (decrypted) return;
            decrypted = true;
            
            terminal.classList.add('hidden');
            decryptContainer.classList.remove('visible');
            
            heartCanvas.classList.add('active');
            particleGlow.classList.add('visible');
            
            createHeartParticles();
            createAmbientParticles();
            
            animate();
            
            setTimeout(() => {
                glowText.classList.add('visible');
                glowText.classList.add('pulsing');
            }, 800);
        }
        
        decryptBtn.addEventListener('click', decrypt);
        document.body.addEventListener('click', (e) => {
            if (!decrypted && decryptContainer.classList.contains('visible')) {
                decrypt();
            }
        });
    </script>
</body>
</html>
